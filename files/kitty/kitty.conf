# --- Cursor style ---
cursor_shape block
cursor_blink_interval 0.6

# --- Cursor trail effect ---
cursor_trail 1
cursor_trail_decay 0.1 0.4
cursor_trail_thickness 1.5
cursor #ffffff

background_opacity 0.5
dynamic_background_opacity yes
window_padding_width 15

# --- Remote control (utilisé par le script kitty-magic-opacity.py) ---
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}

# --- Couleurs (pilotées par ~/.config/color.sh) ---
foreground #ffffff
background #000000
selection_foreground #000000
selection_background #00ffaa
