general {
    immediate_render = true
    hide_cursor = true
    ignore_empty_input = true
    fail_timeout = 1200
}

animations {
    enabled = true
    bezier = smooth, 0.25, 0.1, 0.25, 1
    animation = fade, 1, 2, smooth
    animation = inputFieldDots, 1, 2, smooth
}

background {
    monitor =
    path = /usr/share/backgrounds/space/surfer.png
    color = rgba(000000ff)

    # Hyprlock ne permet pas d'activer ce blur uniquement
    # quand le champ password contient au moins 1 caractère.
    blur_passes = 0

    noise = 0.0117
    contrast = 0.92
    brightness = 0.62
    vibrancy = 0.12
    vibrancy_darkness = 0.35
}

# Carte centrale sans bordure
shape {
    monitor =
    size = 430, 285
    color = rgba(0,0,0,0)
    rounding = 28

    border_size = 0

    shadow_passes = 2
    shadow_size = 10
    shadow_color = rgba(00000099)

    position = 0, 0
    halign = center
    valign = center
    zindex = 1
}

# Heure
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(ffffffff)
    font_size = 72
    font_family = Homoarakhn, monospace

    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(000000aa)

    position = 0, 78
    halign = center
    valign = center
    zindex = 2
}

# Durée depuis le verrouillage
label {
    monitor =
    text = cmd[update:1000] echo "$(ps -o etime= -p $(pgrep -n -x hyprlock) | tr -d ' ')"
    
    font_size = 15
    font_family = Homoarakhn, monospace

    position = 0, 20
    halign = center
    valign = bottom
    zindex = 2
}

# Utilisateur courant
label {
    monitor =
    text = < $USER >
    color = rgba(ffffffcc)
    font_size = 18
    font_family = Homoarakhn, monospace

    position = 0, -22
    halign = center
    valign = center
    zindex = 2
}

# Input mot de passe sans bordure
input-field {
    monitor =
    size = 300, 52
    outline_thickness = 0
    rounding = 18

    dots_size = 0.24
    dots_spacing = 0.16
    dots_center = true

    outer_color = rgba(00000000)
    inner_color = rgba(0,0,0,0)
    font_color = rgba(ffffffff)

    check_color = rgba(0,0,0,0)
    fail_color = rgba(0,0,0,0)

    font_family = Homoarakhn, monospace
    placeholder_text =
    fail_text = wrong password

    fade_on_empty = false
    hide_input = false

    shadow_passes = 1
    shadow_size = 4
    shadow_color = rgba(00000099)

    position = 0, -92
    halign = center
    valign = center
    zindex = 2
}
